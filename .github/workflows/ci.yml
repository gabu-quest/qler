name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Tests • ${{ matrix.os }} • py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      UV_NO_SOURCES: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies (main + dev)
        run: uv sync --dev

      - name: Show versions
        run: |
          uv run python --version
          uv run ruff --version
          uv run pytest --version

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        timeout-minutes: 10
        env:
          PYTHONUTF8: "1"
        run: uv run pytest -v --timeout=30 --timeout-method=thread -p no:cacheprovider --disable-warnings
